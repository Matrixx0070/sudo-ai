# SUDO-AI TOML overlay — generated by 'sudo-ai setup' (Wave2 Ink TUI)
# 100x coverage: cross enable, profiles, learning, SOUL, kills via .env

[intelligence]
default_model = "ollama/kimi-k2.6:cloud"
fallback_model = "ollama/glm-5.2:cloud"  # 2026-07-20 Frank: xAI removed (API-credit billing); was xai/grok-4-1-fast-non-reasoning
temperature = 0.7
max_tokens = 8192

[agent]
max_iterations = 150
system_prompt_append = "Owner loyalty: execute per SOUL. 100x cross control enabled: true."

[tools]
disabled = []

[engine]
runtime = "cloud"
prefer_local = false

[learning.intelligence]
policy = "full"  # 100x ToolOutcomeLearner