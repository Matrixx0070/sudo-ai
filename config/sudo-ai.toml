# SUDO-AI TOML overlay — generated by 'sudo-ai init --preset chat'
# Recipe: Chat Preset v1.0.0
# Optimised for conversational interaction: fast responses, natural tone, low latency. Suitable for messaging channels and interactive use.
# Edit this file to customise. Restart SUDO-AI to apply changes.

[intelligence]
default_model = "xai/grok-4-1-fast-non-reasoning"
fallback_model = "openai/gpt-4o-mini"
temperature = 0.8
max_tokens = 4096

[agent]
max_iterations = 50
system_prompt_append = "You are a helpful assistant. Prioritise:\n- Concise, direct answers\n- Friendly and natural tone\n- Fast responses over exhaustive coverage\n- Ask clarifying questions when needed\n"

[tools]
disabled = ["coder.execute", "system.shell"]

[engine]
runtime = "sudoapi"
prefer_local = false

[learning.routing]
policy = "heuristic"
[learning.intelligence]
policy = "none"
[learning.weights]
accuracy = 0.3
latency = 0.5
cost = 0.1
efficiency = 0.1
