# ci.yml — Continuous Integration workflow
# Runs on every push to main and on every pull request targeting main.
# Gate order: install → lint → test → build
# All three gates must pass; a failure in any step aborts the run.

name: CI

on:
  push:
    branches: [main]        # run on direct pushes to main (e.g. merge commits)
  pull_request:
    branches: [main]        # run on PRs before they can merge

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the full source tree
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up pnpm (must come before setup-node so the cache key is correct)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # 3. Set up Node 20 with pnpm cache enabled
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm              # caches ~/.pnpm-store between runs

      # 4. Install dependencies exactly as locked — fails if lockfile is stale
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Lint — catches style/type errors before running tests
      - name: Lint
        run: pnpm lint

      # 6. Test — full suite must pass (vitest exits non-zero on any failure)
      - name: Test
        run: pnpm test

      # 7. Build — verifies the compiled artefact can be produced cleanly
      - name: Build
        run: pnpm build
