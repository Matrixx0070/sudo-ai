# ci.yml — Continuous Integration workflow
# Runs on every push to main and on every pull request targeting main.
# Gate order: install → lint → test → build
# All three gates must pass; a failure in any step aborts the run.

name: CI

on:
  push:
    branches: [main]        # run on direct pushes to main (e.g. merge commits)
  pull_request:
    branches: [main]        # run on PRs before they can merge

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the full source tree
      - name: Checkout
        uses: actions/checkout@v6

      # 2. Create runtime dirs the tests expect (relative to the checkout).
      #    Tests are now cwd-relative, so no copy to /root is needed.
      - name: Prepare runtime dirs
        run: |
          mkdir -p data .githooks
          mkdir -p /tmp/claude-0

      # 3. Install bubblewrap (required for sandbox integration tests)
      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      # 4. Set up pnpm (must come before setup-node so the cache key is correct)
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      # 5. Set up Node 22
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 6. Install dependencies exactly as locked — fails if lockfile is stale
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 7. Lint — catches style/type errors before running tests
      - name: Lint
        run: pnpm lint

      # 8. Test — full suite must pass (vitest exits non-zero on any failure)
      - name: Test
        run: pnpm test

      # 9. Build — verifies the compiled artefact can be produced cleanly
      - name: Build
        run: pnpm build
