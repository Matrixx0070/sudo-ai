name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    name: Lint Test Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create writable symlink
        run: |
          sudo mkdir -p /root
          sudo rm -rf /root/sudo-ai-v4
          sudo ln -s "$(pwd)" /root/sudo-ai-v4
          sudo chmod -R 777 "$(pwd)"
          mkdir -p data data-staging .githooks src/core/self-build
          chmod -R 777 data data-staging .githooks src/core/self-build
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
