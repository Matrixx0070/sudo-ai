# ci.yml — Continuous Integration workflow
# Runs on every push to main and on every pull request targeting main.
# Gate order: install → lint → test → smoke → build, then a package job that
# proves the published tarball installs and its bin runs.
# All gates must pass; a failure in any step aborts the run.

name: CI

on:
  push:
    branches: [main]        # run on direct pushes to main (e.g. merge commits)
  pull_request:
    branches: [main]        # run on PRs before they can merge

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the full source tree
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # 2. Create runtime dirs the tests expect (relative to the checkout).
      #    Tests are now cwd-relative, so no copy to /root is needed.
      - name: Prepare runtime dirs
        run: |
          mkdir -p data .githooks
          mkdir -p /tmp/claude-0

      # 3. Install bubblewrap (required for sandbox integration tests)
      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      # 4. Set up pnpm (must come before setup-node so the cache key is correct)
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 10.33.0

      # 5. Set up Node 22
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      # 6. Install dependencies exactly as locked — fails if lockfile is stale
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 7. Lint — catches style/type errors before running tests
      - name: Lint
        run: pnpm lint

      # 8. Test — full suite must pass (vitest exits non-zero on any failure)
      - name: Test
        run: pnpm test

      # 8b. Smoke (prod runtime) — runs file-producing tools under the real tsx
      # loader (the daemon's runtime), which catches ESM/CJS dynamic-import interop
      # bugs that vitest masks (e.g. exceljs "Workbook is not a constructor", which
      # shipped the whole spreadsheet subsystem broken while every unit test passed).
      - name: Smoke (prod runtime)
        run: pnpm smoke:prod-tools

      # 9. Build — verifies the compiled artefact can be produced cleanly
      - name: Build
        run: pnpm build

  package:
    name: Package · Install-from-tarball · Run bin
    runs-on: ubuntu-latest
    # Validates the RELEASE SHAPE (files allowlist, bin path, postinstall) that
    # the working-tree build + smoke above never exercise: a missing-from-tarball
    # file or a failing postinstall would otherwise ship green.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 10.33.0

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build dist/ so the tarball carries the same artefact a release would.
      - name: Build
        run: pnpm build

      # Pack exactly what `npm publish` would ship (honours the files allowlist).
      - name: Pack tarball
        run: |
          npm pack
          ls -la ./*.tgz

      # Install the tarball into a clean project with NO source tree and prod
      # deps only — the real consumer environment. Proves the guarded postinstall
      # no-ops cleanly and the bin resolves from dist/ alone.
      - name: Install from tarball and run bin
        run: |
          set -euo pipefail
          TARBALL="$(ls "$GITHUB_WORKSPACE"/*.tgz | head -1)"
          echo "Installing $TARBALL into a clean consumer project…"
          mkdir -p /tmp/consumer && cd /tmp/consumer
          npm init -y >/dev/null 2>&1
          npm install --omit=dev "$TARBALL"
          echo "Running the installed sudo-ai bin…"
          ./node_modules/.bin/sudo-ai --version || ./node_modules/.bin/sudo-ai --help
