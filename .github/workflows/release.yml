# release.yml — NPM publish workflow
# Triggered when a version tag (e.g. v1.2.3) is pushed to the repository.
# Steps mirror CI (install → lint → build → test) then publish to npm with
# build provenance (signed SLSA attestation), a dependency audit, and an SBOM.
# Requires the NPM_TOKEN secret to be set in the repository settings.

name: Release

on:
  push:
    tags:
      - 'v*'               # matches v1.0.0, v2.3.1-beta, etc.

jobs:
  publish:
    name: Build · Test · Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read        # read-only checkout is sufficient
      packages: write       # needed if also publishing to GitHub Packages
      id-token: write       # REQUIRED for npm provenance (OIDC --provenance)

    steps:
      # 1. Check out the tagged commit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # 2. Create runtime dirs the tests expect (relative to the checkout).
      - name: Prepare runtime dirs
        run: |
          mkdir -p data .githooks

      # 3. Install bubblewrap (required for sandbox integration tests)
      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      # 4. Set up pnpm (must come before setup-node for cache to work)
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 9.15.0

      # 5. Set up Node 22 with npm registry auth configured
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org  # injects NODE_AUTH_TOKEN into .npmrc

      # 6. Install dependencies exactly as locked — fails if lockfile is stale
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 7. Audit production dependencies for known advisories. Advisory-only: it
      #    reports but does not block the release on a transitive finding. Make it
      #    a hard gate by dropping the `|| true`.
      - name: Audit dependencies
        run: pnpm audit --prod || true

      # 8. Lint — must pass before build or publish (mirrors CI gate)
      - name: Lint
        run: pnpm lint

      # 9. Compile TypeScript → dist/
      - name: Build
        run: pnpm build

      # 10. Run full test suite — do NOT publish a broken release
      - name: Test
        run: pnpm test

      # 11. Generate a CycloneDX SBOM from pnpm-lock.yaml and keep it as a build
      #     artifact. Uses cdxgen (pnpm-native) because `npm sbom` cannot read a
      #     pnpm peer layout. Advisory (|| true) so SBOM tooling never blocks a
      #     release.
      - name: Generate SBOM
        run: npx -y @cyclonedx/cdxgen@11 -t pnpm -o sbom.cdx.json --no-recurse . || true

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn

      # 12. Publish to npm WITH provenance — a signed SLSA attestation linking the
      #     tarball to this workflow run and commit, verifiable by consumers.
      #     --no-git-checks skips the working-tree-clean guard (detached tag HEAD).
      - name: Publish
        run: pnpm publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}  # set in repo Settings → Secrets
